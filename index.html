<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GridFeed — Your Daily F1 Fix</title>
  <meta name="description" content="Your daily Formula 1 fix. Race previews, live timing, betting picks, driver news." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ===================== CSS VARIABLES ===================== */
    :root {
      --bg:       #F5F5F5;
      --card:     #FFFFFF;
      --header:   #1B1F2A;
      --accent:   #E8002D;
      --gold:     #F5A623;
      --text:     #1B1F2A;
      --dim:      #4A4E5A;
      --muted:    #8A8E9A;
      --border:   #E0E0E8;
      --ticker:   #1B1F2A;
      --radius:   4px;
      --max-w:    1080px;
      --font-body: 'DM Sans', sans-serif;
      --font-head: 'Barlow Condensed', sans-serif;
    }

    /* ===================== RESET ===================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); line-height: 1.5; }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    button { cursor: pointer; border: none; background: none; font-family: var(--font-body); }
    img { display: block; max-width: 100%; }

    /* ===================== TICKER ===================== */
    .ticker-wrap {
      background: var(--ticker);
      overflow: hidden;
      height: 32px;
      display: flex;
      align-items: center;
    }
    .ticker-label {
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 0 12px;
      height: 100%;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .ticker-scroll {
      display: flex;
      gap: 0;
      animation: tickerMove 40s linear infinite;
      white-space: nowrap;
    }
    .ticker-scroll:hover { animation-play-state: paused; }
    .ticker-item {
      color: #E0E0E8;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      padding: 0 24px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .ticker-item .pos { color: var(--gold); font-weight: 700; margin-right: 6px; }
    .ticker-item .gap { color: var(--muted); margin-left: 6px; }
    @keyframes tickerMove {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ===================== HEADER ===================== */
    .site-header {
      background: var(--header);
      border-bottom: 2px solid var(--accent);
    }
    .header-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo svg {
      width: 36px;
      height: 14px;
      fill: #fff;
      opacity: 0.9;
    }
    .logo-text {
      font-family: var(--font-body);
      font-weight: 900;
      font-size: 22px;
      letter-spacing: 3px;
      line-height: 1;
    }
    .logo-text .grid { color: #FFFFFF; }
    .logo-text .feed { color: var(--accent); }
    .logo-tagline {
      color: var(--muted);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .logo-wrap { display: flex; flex-direction: column; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .live-badge {
      display: none;
      align-items: center;
      gap: 5px;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: var(--radius);
      text-transform: uppercase;
    }
    .live-badge.visible { display: flex; }
    .live-dot {
      width: 6px; height: 6px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* ===================== NAV ===================== */
    .site-nav {
      background: var(--header);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .nav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      gap: 0;
    }
    .nav-tab {
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 12px 16px;
      position: relative;
      transition: color 0.15s;
    }
    .nav-tab:hover { color: rgba(255,255,255,0.85); }
    .nav-tab.active {
      color: #ffffff;
    }
    .nav-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
    }

    /* ===================== LAYOUT ===================== */
    .page-wrap {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 28px 20px 60px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ===================== CARDS ===================== */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--dim);
    }
    .card-body { padding: 20px; }

    /* ===================== SECTION LABEL ===================== */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ===================== ARTICLE ROWS ===================== */
    .article-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .article-row:last-child { border-bottom: none; }
    .article-row:hover { background: rgba(0,0,0,0.015); margin: 0 -20px; padding: 16px 20px; }
    .article-num {
      font-size: 22px;
      font-weight: 900;
      color: var(--border);
      min-width: 28px;
      line-height: 1;
      margin-top: 2px;
    }
    .article-meta { flex: 1; }
    .article-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      margin-bottom: 6px;
    }
    .tag-race     { background: #FEE2E2; color: var(--accent); }
    .tag-qual     { background: #FEF3C7; color: #B45309; }
    .tag-betting  { background: #D1FAE5; color: #065F46; }
    .tag-preview  { background: #DBEAFE; color: #1E40AF; }
    .tag-analysis { background: #EDE9FE; color: #5B21B6; }
    .tag-breaking { background: var(--accent); color: #fff; }
    .article-title {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .article-byline {
      font-size: 11px;
      color: var(--muted);
    }
    .article-byline span { color: var(--dim); }

    /* ===================== HOME — HERO ===================== */
    .hero {
      background: var(--header);
      border-radius: var(--radius);
      padding: 32px 32px 28px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(232,0,45,0.06));
      pointer-events: none;
    }
    .hero-kicker {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .hero-title {
      font-family: var(--font-head);
      font-size: 40px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .hero-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 20px;
    }
    .hero-countdown {
      display: flex;
      gap: 16px;
    }
    .countdown-unit { text-align: center; }
    .countdown-num {
      font-size: 28px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1;
    }
    .countdown-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-top: 3px;
    }
    .countdown-sep {
      font-size: 24px;
      font-weight: 900;
      color: var(--accent);
      align-self: flex-start;
      margin-top: 2px;
    }

    /* ===================== HOME — GRID ===================== */
    .home-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    @media (max-width: 640px) { .home-grid { grid-template-columns: 1fr; } }

    /* ===================== QUICK PICKS STRIP ===================== */
    .picks-strip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 28px;
    }
    .picks-strip-header {
      background: var(--header);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .picks-strip-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
    }
    .picks-strip-body { padding: 16px 20px; display: flex; gap: 12px; flex-wrap: wrap; }
    .pick-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      flex: 1;
      min-width: 160px;
    }
    .pick-chip-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .pick-chip-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .pick-chip-odds { color: var(--gold); margin-left: 6px; }
    .pick-chip-conf {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ===================== NEWSLETTER CTA ===================== */
    .newsletter-cta {
      background: var(--header);
      border-radius: var(--radius);
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .newsletter-cta h3 {
      font-family: var(--font-head);
      font-size: 20px;
      color: #fff;
      margin-bottom: 4px;
    }
    .newsletter-cta p {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }
    .newsletter-form { display: flex; gap: 8px; flex-shrink: 0; }
    .newsletter-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius);
      color: #fff;
      font-family: var(--font-body);
      font-size: 13px;
      padding: 10px 14px;
      width: 220px;
      outline: none;
    }
    .newsletter-input::placeholder { color: rgba(255,255,255,0.3); }
    .newsletter-input:focus { border-color: var(--accent); }
    .btn-accent {
      background: var(--accent);
      color: #fff;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 10px 18px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn-accent:hover { opacity: 0.88; }

    /* ===================== RESULTS / TIMING ===================== */
    .timing-table {
      width: 100%;
      border-collapse: collapse;
    }
    .timing-table th {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .timing-table td {
      padding: 12px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .timing-table tr:last-child td { border-bottom: none; }
    .timing-table tr:hover td { background: rgba(0,0,0,0.02); }
    .pos-num {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      min-width: 24px;
      display: inline-block;
    }
    .pos-num.p1 { color: var(--gold); }
    .pos-num.p2 { color: var(--dim); }
    .pos-num.p3 { color: #B45309; }
    .driver-name { font-weight: 600; }
    .driver-abbr {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .team-tag {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }
    .time-col { font-variant-numeric: tabular-nums; font-size: 13px; font-weight: 500; }
    .gap-col { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
    .session-tabs {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      overflow: hidden;
    }
    .session-tab {
      flex: 1;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .session-tab.active { background: var(--header); color: #fff; }
    .session-tab:hover:not(.active) { background: var(--bg); color: var(--dim); }

    /* ===================== STANDINGS ===================== */
    .standings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 640px) { .standings-grid { grid-template-columns: 1fr; } }
    .pts-bar-wrap { display: flex; align-items: center; gap: 10px; }
    .pts-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .pts-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .pts-num { font-weight: 700; font-size: 13px; min-width: 32px; text-align: right; }
    .constructor-color-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ===================== PICKS PAGE ===================== */
    .picks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 640px) { .picks-grid { grid-template-columns: 1fr; } }
    .pick-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
    .pick-card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .pick-type-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .pick-type-best-bet  { color: var(--gold); }
    .pick-type-value     { color: #059669; }
    .pick-type-longshot  { color: #7C3AED; }
    .pick-type-fade      { color: var(--accent); }
    .pick-card-body { padding: 16px; }
    .pick-driver { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
    .pick-market { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .pick-odds-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .pick-odds { font-size: 22px; font-weight: 900; color: var(--gold); }
    .pick-edge { font-size: 11px; color: #059669; font-weight: 600; }
    .pick-analysis { font-size: 12px; color: var(--dim); line-height: 1.55; }
    .picks-locked-badge {
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      color: #065F46;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
    }
    .betting-record {
      display: flex;
      gap: 20px;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
      align-items: center;
    }
    .record-stat { text-align: center; }
    .record-num { font-size: 22px; font-weight: 900; }
    .record-num.win { color: #059669; }
    .record-num.loss { color: var(--accent); }
    .record-num.roi { color: var(--gold); }
    .record-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
    .record-divider { width: 1px; background: var(--border); height: 36px; }

    /* ===================== SCHEDULE ===================== */
    .schedule-list { display: flex; flex-direction: column; gap: 0; }
    .race-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .race-row:last-child { border-bottom: none; }
    .race-row:hover { background: rgba(0,0,0,0.015); }
    .race-row.upcoming .race-num { color: var(--accent); }
    .race-row.completed { opacity: 0.55; }
    .race-num {
      font-size: 13px;
      font-weight: 900;
      color: var(--muted);
      min-width: 28px;
    }
    .race-flag { font-size: 20px; }
    .race-info { flex: 1; }
    .race-name { font-weight: 700; font-size: 14px; }
    .race-circuit { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .race-date { font-size: 12px; font-weight: 600; color: var(--dim); white-space: nowrap; }
    .race-status {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
    }
    .status-next { background: var(--accent); color: #fff; }
    .status-done { background: var(--bg); color: var(--muted); }
    .status-live { background: #DCFCE7; color: #065F46; }

    /* ===================== NEWS ===================== */
    .news-filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-btn {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--dim);
      cursor: pointer;
      transition: all 0.12s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ===================== UTILS ===================== */
    .flex-row { display: flex; align-items: center; gap: 12px; }
    .spacer { flex: 1; }
    .text-muted { color: var(--muted); }
    .text-accent { color: var(--accent); }
    .text-gold { color: var(--gold); }
    .fw-700 { font-weight: 700; }
    .fs-11 { font-size: 11px; }
    .mb-20 { margin-bottom: 20px; }
    .mb-28 { margin-bottom: 28px; }
    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .refresh-bar {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .two-col {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<!-- ==================== TICKER ==================== -->
<div class="ticker-wrap" id="ticker">
  <div class="ticker-label">⬤ LIVE</div>
  <div style="overflow:hidden;flex:1;">
    <div class="ticker-scroll" id="tickerContent">
      <!-- Populated by JS -->
    </div>
  </div>

<script>
'use strict';

/* ===================== CONFIG ===================== */
const CONFIG = {
  supabaseUrl:    'YOUR_SUPABASE_URL',       // replace before deploy
  supabaseKey:    'YOUR_SUPABASE_ANON_KEY',  // replace before deploy
  openF1Base:     'https://api.openf1.org/v1',
  jolpicaBase:    'https://api.jolpi.ca/ergast/f1',
  fetchTimeout:   8000,
  refreshMs:      30000,
  articlesLimit:  20,
};

/* ===================== SUPABASE ===================== */
// Guard: don't crash on placeholder credentials before deploy
let sb = null;
try {
  if (CONFIG.supabaseUrl !== 'YOUR_SUPABASE_URL') {
    sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);
  }
} catch(e) {
  console.warn('[GridFeed] Supabase not initialized — add credentials to CONFIG', e);
}

// Safe Supabase query wrapper — returns empty data if sb not ready
async function sbQuery(fn) {
  if (!sb) return { data: null, error: new Error('Supabase not configured') };
  try { return await fn(sb); }
  catch(e) { return { data: null, error: e }; }
}

/* ===================== STATE ===================== */
const STATE = {
  activeTab:       'home',
  activeSession:   'race',
  newsFilter:      'ALL',
  allArticles:     [],
  allPicks:        [],
  timingData:      {},
  refreshTimer:    null,
  countdownTimer:  null,
  nextRace:        null,
};

/* ===================== FETCH WITH TIMEOUT ===================== */
// Uses Promise.race instead of AbortController — avoids AbortSignal cloning errors
async function fetchWT(url, opts = {}, timeout = CONFIG.fetchTimeout) {
  const timeoutPromise = new Promise((_, reject) =>
    setTimeout(() => reject(new Error('Request timed out: ' + url)), timeout)
  );
  return Promise.race([fetch(url, opts), timeoutPromise]);
}

/* ===================== TAB SWITCHING ===================== */
function switchTab(tabName) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${tabName}`));
  STATE.activeTab = tabName;
  if (tabName === 'results')   initResults();
  if (tabName === 'standings') initStandings();
  if (tabName === 'schedule')  initSchedule();
  if (tabName === 'picks')     initPicks();
  if (tabName === 'news')      initNews();
}

document.querySelectorAll('.nav-tab').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

/* ===================== SESSION SWITCHING ===================== */
function switchSession(session) {
  document.querySelectorAll('.session-tab').forEach(t => t.classList.toggle('active', t.dataset.session === session));
  STATE.activeSession = session;
  renderTimingTable();
}

/* ===================== TAG CLASS HELPER ===================== */
function tagClass(tag) {
  const map = { RACE:'tag-race', QUALIFYING:'tag-qual', BETTING:'tag-betting', PREVIEW:'tag-preview', ANALYSIS:'tag-analysis', BREAKING:'tag-breaking' };
  return map[tag] || 'tag-preview';
}

/* ===================== DATE HELPER ===================== */
function timeAgo(isoDate) {
  const diff = Date.now() - new Date(isoDate).getTime();
  const mins  = Math.floor(diff / 60000);
  const hrs   = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins < 60)  return `${mins}m ago`;
  if (hrs  < 24)  return `${hrs}h ago`;
  return `${days}d ago`;
}

function fmtDate(isoDate) {
  return new Date(isoDate).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

/* ===================== ARTICLE ROW RENDERER ===================== */
function renderArticleRow(article, idx) {
  const tag = (article.tags || ['ANALYSIS'])[0];
  return `
    <div class="article-row" onclick="openArticle('${article.id}')">
      <div class="article-num">${String(idx + 1).padStart(2,'0')}</div>
      <div class="article-meta">
        <div class="article-tag ${tagClass(tag)}">${tag}</div>
        <div class="article-title">${article.title}</div>
        <div class="article-byline">By <span>${article.author || 'GridFeed Staff'}</span> · ${timeAgo(article.published_at || article.created_at)}</div>
      </div>
    </div>`;
}

function openArticle(id) {
  const a = STATE.allArticles.find(x => x.id === id);
  if (!a) return;
  // TODO: article modal or full-page view
  alert(`[GridFeed] Article: ${a.title}\n\nExpand to article view on next build step.`);
}

/* ===================== HOME INIT ===================== */
async function initHome() {
  renderHero();
  await Promise.all([loadHomeArticles(), loadHomePicks(), renderHomeScheduleCard()]);
}

function renderHero() {
  const hero = document.getElementById('homeHero');
  const { name, circuit, date } = STATE.nextRace || { name:'Loading...', circuit:'—', date: new Date() };
  hero.innerHTML = `
    <div class="hero mb-28">
      <div class="hero-kicker">▶ Next Race</div>
      <div class="hero-title" id="heroTitle">${name}</div>
      <div class="hero-subtitle" id="heroSubtitle">${circuit}</div>
      <div class="hero-countdown" id="heroCountdown">
        <div class="countdown-unit"><div class="countdown-num" id="cdDays">--</div><div class="countdown-label">Days</div></div>
        <div class="countdown-sep">:</div>
        <div class="countdown-unit"><div class="countdown-num" id="cdHrs">--</div><div class="countdown-label">Hrs</div></div>
        <div class="countdown-sep">:</div>
        <div class="countdown-unit"><div class="countdown-num" id="cdMins">--</div><div class="countdown-label">Mins</div></div>
        <div class="countdown-sep">:</div>
        <div class="countdown-unit"><div class="countdown-num" id="cdSecs">--</div><div class="countdown-label">Secs</div></div>
      </div>
    </div>`;
  if (STATE.nextRace?.date) startCountdown(new Date(STATE.nextRace.date));
}

function startCountdown(raceDate) {
  if (STATE.countdownTimer) clearInterval(STATE.countdownTimer);
  function tick() {
    const diff = raceDate - Date.now();
    if (diff <= 0) { clearInterval(STATE.countdownTimer); return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    const el = id => document.getElementById(id);
    if(el('cdDays'))  el('cdDays').textContent  = String(d).padStart(2,'0');
    if(el('cdHrs'))   el('cdHrs').textContent   = String(h).padStart(2,'0');
    if(el('cdMins'))  el('cdMins').textContent  = String(m).padStart(2,'0');
    if(el('cdSecs'))  el('cdSecs').textContent  = String(s).padStart(2,'0');
  }
  tick();
  STATE.countdownTimer = setInterval(tick, 1000);
}

async function loadHomeArticles() {
  try {
    const { data, error } = await sbQuery(s =>
      s.from('articles')
       .select('id,title,tags,author,published_at,created_at')

       .order('published_at', { ascending:false })
       .limit(8)

    if (error) throw error;
    STATE.allArticles = [...(STATE.allArticles || []), ...(data || [])];
    const el = document.getElementById('homeArticles');
    if (!data?.length) { el.innerHTML = '<div class="empty-state">No articles yet.</div>'; return; }

async function loadHomePicks() {

    const { data } = await sbQuery(s => s.from('betting_picks').select('*').eq('status','active').limit(3));
    const card = document.getElementById('homePicksCard');
    if (!data?.length) { card.innerHTML = '<div class="card"><div class="card-body text-muted fs-11">No picks yet for this race.</div></div>'; return; }
    const items = data.map(p => `
      <div class="pick-chip">
        <div class="pick-chip-label">${p.pick_type || 'Pick'}</div>
        <div class="pick-chip-value">${p.driver_name || p.selection}<span class="pick-chip-odds">${p.odds || ''}</span></div>
        <div class="pick-chip-conf">${p.market || ''}</div>

    card.innerHTML = `
      <div class="picks-strip">
        <div class="picks-strip-header">
          <span class="picks-strip-title">Race Picks</span>
          <span class="picks-locked-badge">Locked</span>
        </div>
        <div class="picks-strip-body">${items}</div>
      </div>`;
  } catch(e) {
    document.getElementById('homePicksCard').innerHTML = '';
  }
}

async function renderHomeScheduleCard() {
  const card = document.getElementById('homeScheduleCard');
  // Show 3 done + next 3 upcoming (skip cancelled)
  const relevant = F1_SCHEDULE_2026
    .filter(r => r.status !== 'cancelled')
    .filter(r => r.status === 'done' || r.status === 'upcoming')
    .slice(-2).concat(
      F1_SCHEDULE_2026.filter(r => r.status === 'upcoming' && r.round).slice(0, 3)
    );
  // Deduplicate
  const seen = new Set();
  const rows = relevant.filter(r => { if (seen.has(r.round)) return false; seen.add(r.round); return true; });

  card.innerHTML = `<div style="padding:0;">` + rows.map(r => {
    const isDone = r.status === 'done';
    const isNext = STATE.nextRace?.round === r.round;
    return `
      <div class="race-row ${isDone ? 'completed':'upcoming'}" style="padding:10px 16px;">
        <span class="race-flag">${r.flag}</span>
        <div class="race-info">
          <div class="race-name" style="font-size:13px;">R${r.round} · ${r.name.replace(' Grand Prix','').replace(' GP','')}</div>
          <div class="race-circuit" style="font-size:11px;">${r.dateLabel}</div>
        </div>
        ${isDone
          ? `<span style="font-size:11px;color:var(--muted);">${r.winner || '✓'}</span>`
          : isNext
            ? '<span class="race-status status-next">Next</span>'
            : ''}
      </div>`;
  }).join('') + '</div>';
}

/* ===================== RESULTS INIT ===================== */
async function initResults() {
  await fetchTimingData();
  scheduleRefresh();
}

// OpenF1 session type mapping
const SESSION_MAP = {
  race:       'Race',
  qualifying: 'Qualifying',
  fp3:        'Practice 3',
  fp2:        'Practice 2',
  fp1:        'Practice 1',
};

async function fetchTimingData() {
  const bar = document.getElementById('resultsRefreshBar');
  if (bar) bar.innerHTML = '<div class="spinner" style="width:12px;height:12px;"></div>';

  try {
    // 1. Get latest session for the active session type
    const sessionType = SESSION_MAP[STATE.activeSession] || 'Race';
    const sessRes = await fetchWT(
      `${CONFIG.openF1Base}/sessions?year=2026&session_name=${encodeURIComponent(sessionType)}`
    );
    if (!sessRes.ok) throw new Error(`Sessions HTTP ${sessRes.status}`);
    const sessions = await sessRes.json();
    if (!sessions?.length) throw new Error('No sessions found');

    // Most recent matching session
    const session = sessions[sessions.length - 1];
    STATE.currentSessionKey = session.session_key;

    // Update race title
    const title = document.getElementById('resultsRaceTitle');
    if (title) title.textContent = `${session.meeting_name || 'F1'} — ${session.session_name}`;

    // Check if session is live (started but not ended)
    const now = new Date();
    const start = new Date(session.date_start);
    const end   = new Date(session.date_end);
    const isLive = now >= start && now <= end;
    document.getElementById('liveBadge')?.classList.toggle('visible', isLive);

    // 2. Fetch positions for this session
    const posRes = await fetchWT(
      `${CONFIG.openF1Base}/position?session_key=${session.session_key}`
    );
    if (!posRes.ok) throw new Error(`Position HTTP ${posRes.status}`);
    const positions = await posRes.json();

    // 3. Fetch drivers for name mapping
    const drvRes = await fetchWT(
      `${CONFIG.openF1Base}/drivers?session_key=${session.session_key}`
    );
    const drivers = drvRes.ok ? await drvRes.json() : [];
    const driverMap = {};
    drivers.forEach(d => { driverMap[d.driver_number] = d; });

    // 4. Build latest position per driver (last entry wins)
    const latestPos = {};
    positions.forEach(p => {
      if (!latestPos[p.driver_number] || p.date > latestPos[p.driver_number].date) {
        latestPos[p.driver_number] = p;
      }
    });

    const sorted = Object.values(latestPos)
      .sort((a, b) => a.position - b.position)
      .map((p, i) => {
        const d = driverMap[p.driver_number] || {};
        return {
          pos:       p.position || i + 1,
          driver:    d.full_name || d.broadcast_name || `#${p.driver_number}`,
          abbr:      d.name_acronym || '',
          team:      d.team_name || '',
          time:      '—',  // lap times from separate endpoint — added in v2
          gap:       p.position === 1 ? 'Leader' : '—',
          teamColor: d.team_colour ? `#${d.team_colour}` : '#8A8E9A',
        };
      });

    STATE.timingData[STATE.activeSession] = sorted;

  } catch(e) {
    console.error('[GridFeed] Timing fetch error:', e.message);
    document.getElementById('timingData').innerHTML =
      `<div class="empty-state">Timing unavailable — ${e.message}</div>`;
  }

  if (bar) bar.innerHTML = `Updated ${new Date().toLocaleTimeString()}`;
  renderTimingTable();
}

function renderTimingTable() {
  const el = document.getElementById('timingData');
  const data = STATE.timingData[STATE.activeSession];
  if (!data?.length) {
    el.innerHTML = `<div class="empty-state">No ${STATE.activeSession.toUpperCase()} data available.</div>`;
    return;
  }
  el.innerHTML = `
    <table class="timing-table">
      <thead>
        <tr>
          <th style="width:40px;">Pos</th>
          <th>Driver</th>
          <th>Team</th>
          <th>Time</th>
          <th>Gap</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(d => `
          <tr>
            <td><span class="pos-num ${d.pos<=3?`p${d.pos}`:''}">P${d.pos}</span></td>
            <td>
              <div class="driver-name">${d.driver} <span class="driver-abbr">${d.abbr}</span></div>
            </td>
            <td>
              <div style="display:flex;align-items:center;gap:6px;">
                <div class="constructor-color-dot" style="background:${d.teamColor};"></div>
                <span class="team-tag">${d.team}</span>
              </div>
            </td>
            <td class="time-col">${d.time}</td>
            <td class="gap-col">${d.gap}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

function scheduleRefresh() {
  if (STATE.refreshTimer) clearInterval(STATE.refreshTimer);
  STATE.refreshTimer = setInterval(() => {
    if (STATE.activeTab === 'results') fetchTimingData();
    if (STATE.activeTab === 'standings') fetchStandings();
  }, CONFIG.refreshMs);
}

  el.innerHTML = articles.map((a,i) => renderArticleRow(a,i)).join('');

/* ===================== PICKS INIT ===================== */
async function initPicks() {
  try {
    const [picksRes, recordRes] = await Promise.all([
      sbQuery(s => s.from('betting_picks').select('*').eq('status','active')),
      sbQuery(s => s.from('betting_record').select('*').order('created_at',{ascending:false}).limit(1)),
    ]);
    STATE.allPicks = picksRes.data || [];
    renderPicks();
    renderBettingRecord(recordRes.data?.[0]);

    const raceTitle = document.getElementById('picksRaceTitle');
    const locked    = document.getElementById('picksLockedStatus');
    if (STATE.nextRace && raceTitle) raceTitle.textContent = `${STATE.nextRace.name} Picks`;
    if (STATE.allPicks.length && locked) locked.textContent = '🔒 Picks locked for this race weekend';
  } catch(e) {
    document.getElementById('picksGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1;">Could not load picks.</div>';
  }
}

function renderPicks() {
  const el = document.getElementById('picksGrid');
  if (!STATE.allPicks.length) {
    el.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">No picks set for this race yet.</div>';
    return;
  }
  el.innerHTML = STATE.allPicks.map(p => {
    const typeClass = {
      'BEST BET':'pick-type-best-bet',
      'VALUE':'pick-type-value',
      'LONGSHOT':'pick-type-longshot',
      'FADE':'pick-type-fade',
    }[p.pick_type] || 'pick-type-value';
    return `
      <div class="pick-card">
        <div class="pick-card-header">
          <span class="pick-type-label ${typeClass}">${p.pick_type || 'Pick'}</span>
          <span class="picks-locked-badge">Locked</span>
        </div>
        <div class="pick-card-body">
          <div class="pick-driver">${p.driver_name || p.selection || '—'}</div>
          <div class="pick-market">${p.market || ''}</div>
          <div class="pick-odds-row">
            <span class="pick-odds">${p.odds || '—'}</span>
            ${p.edge ? `<span class="pick-edge">+${p.edge}% edge</span>` : ''}
          </div>
          <div class="pick-analysis">${p.analysis || ''}</div>
        </div>
      </div>`;
  }).join('');
}

function renderBettingRecord(record) {
  const el = document.getElementById('bettingRecord');
  if (!record) { el.innerHTML = ''; return; }
  const roi = record.roi >= 0 ? `+${record.roi}%` : `${record.roi}%`;
  el.innerHTML = `
    <div class="betting-record">
      <div class="record-stat"><div class="record-num win">${record.wins || 0}</div><div class="record-label">Wins</div></div>
      <div class="record-divider"></div>
      <div class="record-stat"><div class="record-num loss">${record.losses || 0}</div><div class="record-label">Losses</div></div>
      <div class="record-divider"></div>
      <div class="record-stat"><div class="record-num roi">${roi}</div><div class="record-label">ROI</div></div>
      <div class="record-divider"></div>
      <div class="record-stat"><div class="record-num" style="font-size:16px;">${record.season || '2026'}</div><div class="record-label">Season</div></div>
    </div>`;
}

/* ===================== STANDINGS ===================== */
async function initStandings() {
  await fetchStandings();
}

async function fetchStandings() {
  const bar = document.getElementById('standingsRefreshBar');
  if (bar) bar.innerHTML = '<div class="spinner" style="width:12px;height:12px;display:inline-block;"></div>';
  try {
    // Jolpica (Ergast successor) — free, no auth, reliable
    const [drvRes, ctorRes] = await Promise.all([
      fetchWT(`${CONFIG.jolpicaBase}/2026/driverStandings.json`),
      fetchWT(`${CONFIG.jolpicaBase}/2026/constructorStandings.json`),
    ]);

    const drvJson  = drvRes.ok  ? await drvRes.json()  : null;
    const ctorJson = ctorRes.ok ? await ctorRes.json() : null;

    const drvList  = drvJson?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings || [];
    const ctorList = ctorJson?.MRData?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings || [];

    const drivers = drvList.map(e => ({
      pos:   parseInt(e.position) || 0,
      name:  `${e.Driver?.givenName} ${e.Driver?.familyName}`,
      abbr:  e.Driver?.code || '',
      pts:   parseFloat(e.points) || 0,
      color: TEAM_COLORS[e.Constructors?.[0]?.constructorId] || 'var(--accent)',
    }));

    const ctors = ctorList.map(e => ({
      pos:   parseInt(e.position) || 0,
      name:  e.Constructor?.name || '—',
      abbr:  e.Constructor?.constructorId?.toUpperCase() || '',
      pts:   parseFloat(e.points) || 0,
      color: TEAM_COLORS[e.Constructor?.constructorId] || 'var(--accent)',
    }));

    renderStandingsTable('driverStandings', drivers);
    renderStandingsTable('constructorStandings', ctors);

  } catch(e) {
    console.error('[GridFeed] Standings error:', e.message);
    document.getElementById('driverStandings').innerHTML = '<div class="empty-state">Standings unavailable.</div>';
    document.getElementById('constructorStandings').innerHTML = '';
  }
  if (bar) bar.textContent = `Updated ${new Date().toLocaleTimeString()}`;
}

// Constructor colours — matches Jolpica constructorId keys
const TEAM_COLORS = {
  'red_bull':       '#3671C6',
  'ferrari':        '#E8002D',
  'mercedes':       '#27F4D2',
  'mclaren':        '#FF8000',
  'aston_martin':   '#229971',
  'alpine':         '#FF87BC',
  'williams':       '#64C4FF',
  'rb':             '#6692FF',
  'kick_sauber':    '#52E252',
  'haas':           '#B6BABD',
};

function renderStandingsTable(elId, entries) {
  const el = document.getElementById(elId);
  if (!entries.length) { el.innerHTML = '<div class="empty-state">No data.</div>'; return; }
  const maxPts = entries[0]?.pts || 1;
  el.innerHTML = `
    <table class="timing-table">
      <thead>
        <tr>
          <th style="width:36px;">Pos</th>
          <th>Name</th>
          <th>Points</th>
        </tr>
      </thead>
      <tbody>
        ${entries.map((e,i) => `
          <tr>
            <td><span class="pos-num ${i<3?`p${i+1}`:''}">P${i+1}</span></td>
            <td>
              <div style="display:flex;align-items:center;gap:8px;">
                <div class="constructor-color-dot" style="background:${e.color}"></div>
                <div>
                  <div class="driver-name">${e.name}</div>
                  ${e.abbr ? `<div class="driver-abbr">${e.abbr}</div>` : ''}
                </div>
              </div>
            </td>
            <td>
              <div class="pts-bar-wrap">
                <div class="pts-bar"><div class="pts-bar-fill" style="width:${(e.pts/maxPts*100).toFixed(1)}%"></div></div>
                <span class="pts-num">${e.pts}</span>
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

/* ===================== SCHEDULE ===================== */
async function initSchedule() {
  const el = document.getElementById('scheduleList');
  let nextMarked = false;
  el.innerHTML = F1_SCHEDULE_2026.map(r => {
    const isCancelled = r.status === 'cancelled';
    const isDone      = r.status === 'done';
    const isNext      = !nextMarked && r.status === 'upcoming' ? (nextMarked = true) : false;
    const rowClass    = isCancelled ? 'completed' : isDone ? 'completed' : 'upcoming';

    const statusBadge = isCancelled
      ? `<span class="race-status" style="background:#FEE2E2;color:#991B1B;border:1px solid #FECACA;">Cancelled</span>`
      : isDone
        ? `<span class="race-status status-done">${r.winner ? r.winner : 'Done'}</span>`
        : isNext
          ? `<span class="race-status status-next">Next</span>`
          : '';

    const sprintBadge = r.sprint && !isCancelled
      ? `<span style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:#FEF3C7;color:#92400E;padding:2px 6px;border-radius:2px;margin-right:4px;">Sprint</span>`
      : '';

    const noteBadge = r.note
      ? `<span style="font-size:9px;color:var(--muted);font-style:italic;margin-left:6px;">${r.note}</span>`
      : '';

    return `
      <div class="race-row ${rowClass}" style="${isCancelled ? 'opacity:0.4;' : ''}">
        <span class="race-num" style="${isCancelled ? 'color:var(--muted);' : ''}">${r.round ? String(r.round).padStart(2,'0') : '—'}</span>
        <span class="race-flag">${r.flag}</span>
        <div class="race-info">
          <div class="race-name">${r.name}${noteBadge}</div>
          <div class="race-circuit">${r.circuit}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          ${sprintBadge}
          <div class="race-date">${r.dateLabel}</div>
          ${statusBadge}
        </div>
      </div>`;
  }).join('');
}

/* ===================== TICKER ===================== */
function renderTicker(items) {
  const el = document.getElementById('tickerContent');
  if (!items?.length) {
    items = [
      { label: 'GridFeed', text: 'Formula 1 coverage — Race results, betting picks, standings' },
      { label: 'F1 2026', text: 'Season underway — Follow every race' },
    ];
  }
  const doubled = [...items, ...items];
  el.innerHTML = doubled.map(item =>
    `<span class="ticker-item"><span class="pos">${item.label}</span>${item.text}</span>`
  ).join('');
}

  if (!email || !email.includes('@')) { alert('Please enter a valid email.'); return; }
  // TODO: POST to Beehiiv API via Netlify function
  alert(`Thanks! You're subscribed to the GridFeed Brief.`);

}

/* ===================== NEXT RACE DETECT ===================== */
function detectNextRace() {
  const today = new Date();
  const next = F1_SCHEDULE_2026.find(r => r.status !== 'cancelled' && new Date(r.date) > today);
  STATE.nextRace = next || F1_SCHEDULE_2026.filter(r => r.status !== 'cancelled').pop();
}
